<!DOCTYPE html>
<html>
  <head>
    <!-- A-Frameと背景モジュールのCDN -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
    
  </head>
  <body>
    <!--シーン（VR空間）生成 -->
    <a-scene>
      <!-- 3Dモデル（gltfファイル） -->
      <a-assets>
<!--       <a-asset-items id="ASM_ASM" src="./data/ASM_ASM.gltf" ></a-asset-items>--> 
        <a-asset-items id="BASE_ASM" src="./data/NOVA2_base.gltf" ></a-asset-items>
        <a-asset-items id="J1_ASM" src="./data/NOVA2_J1.gltf" ></a-asset-items>
        <a-asset-items id="J2_ASM" src="./data/NOVA2_J2.gltf" ></a-asset-items>
        <a-asset-items id="J3_ASM" src="./data/NOVA2_J3.gltf" ></a-asset-items>
        <a-asset-items id="J4_ASM" src="./data/J4_ASM.gltf" ></a-asset-items>
        <a-asset-items id="J5_ASM" src="./data/J5_ASM.gltf" ></a-asset-items>
        <a-asset-items id="J6_ASM" src="./data/J6_ASM.gltf" ></a-asset-items>
      </a-assets>
      <!-- <a-entity gltf-model="#ASM_ASM" scale="0.01 0.01 0.01" position="3 0 0" rotation="-90 0 0" animation="property: rotation; to: -90 360 0; loop: true"></a-entity> -->
       <a-entity box position="0 1.5 -1">
<!--      <a-entity gltf-model="#ASM_ASM" scale="0.01 0.01 0.01" position="3 0 0" rotation="-90 0 0"></a-entity>
      animation="property: rotation; to: 0 -360 0; loop: true"
-->      <a-entity gltf-model="#BASE_ASM"  position="0 0 0" rotation="-90 0 0">
           <a-entity gltf-model="#J1_ASM"  position="0 0 0" rotation="0 0 0" animation="property: rotation; to: 0 0 360; loop: true">
             <a-entity gltf-model="#J2_ASM"  position="0 0.0595 0.218" rotation="0 0 0" animation="property: rotation; to: 0 180 0; loop: true">
             <a-entity gltf-model="#J3_ASM" position="0 0.01988 0.2799" rotation="0 0 0" animation="property: rotation; to: 0 180 0; loop: true"></a-entity>

             </a-entity> 
    </a-entity>
      <a-entity gltf-model="#J4_ASM" scale="0.01 0.01 0.01" position="-3 0 0" rotation="-90 0 0"></a-entity>
      <a-entity gltf-model="#J5_ASM" scale="0.01 0.01 0.01" position="-3 0 0" rotation="-90 0 0"></a-entity>
      <a-entity gltf-model="#J6_ASM" scale="0.01 0.01 0.01" position="-3 0 0" rotation="-90 0 0"></a-entity>
    </a-entity>
    </a-entity>

      <!-- カーソル認識 -->
      <a-entity id="rig" position="0 0 2">
        <a-camera id="camera" cursor="rayOrigin: mouse;"></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
